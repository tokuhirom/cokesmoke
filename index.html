<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Coalsmoke - Steampunk Roguelike</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: #1a1a2e;
        color: #c8c8c8;
        font-family: "Courier New", monospace;
        overflow: hidden;
        touch-action: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100dvh;
        user-select: none;
        -webkit-user-select: none;
      }
      #status-bar {
        width: 100%;
        padding: 4px 8px;
        background: linear-gradient(180deg, #1a2744, #16213e);
        font-size: 13px;
        line-height: 1.5;
        border-bottom: 1px solid #2a3a5e;
        white-space: nowrap;
      }
      .hp-color { color: #e94560; }
      .sp-color { color: #88ccff; }
      .fuel-color { color: #ffcc00; }
      .floor-color { color: #aaaacc; }
      #game-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        width: 100%;
      }
      #game-container canvas {
        max-width: 100%;
        max-height: 100%;
      }
      #message-log {
        width: 100%;
        padding: 3px 8px;
        background: #0a0a1a;
        font-size: 12px;
        height: 2.8em;
        overflow: hidden;
        line-height: 1.4;
        border-top: 1px solid #222244;
        color: #aabbcc;
      }
      #skill-bar {
        width: 100%;
        padding: 6px 4px;
        background: linear-gradient(0deg, #0d1b30, #16213e);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
        border-top: 1px solid #2a3a5e;
      }
      #skill-bar button {
        background: #0f3460;
        color: #e94560;
        border: 1px solid #e94560;
        padding: 10px 4px;
        font-family: "Courier New", monospace;
        font-size: 11px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.1s;
        min-height: 44px;
      }
      #skill-bar button:active:not(:disabled) {
        background: #e94560;
        color: #0f3460;
      }
      #skill-bar button:disabled {
        opacity: 0.3;
        border-color: #666;
        color: #666;
      }
      #skill-bar button.wait-btn {
        border-color: #88ccff;
        color: #88ccff;
      }
      #skill-bar button.descend-btn {
        border-color: #ffcc00;
        color: #ffcc00;
      }

      /* Title / Help overlay */
      #overlay {
        position: fixed;
        inset: 0;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 16px;
        overflow-y: auto;
      }
      #overlay.hidden { display: none; }
      #overlay h1 {
        font-size: 28px;
        color: #e94560;
        margin-bottom: 4px;
        letter-spacing: 4px;
      }
      #overlay .subtitle {
        color: #88ccff;
        font-size: 13px;
        margin-bottom: 24px;
      }
      #overlay .menu-btn {
        background: #0f3460;
        color: #e94560;
        border: 1px solid #e94560;
        padding: 12px 32px;
        font-family: "Courier New", monospace;
        font-size: 16px;
        border-radius: 4px;
        cursor: pointer;
        margin: 6px 0;
        min-width: 200px;
        text-align: center;
      }
      #overlay .menu-btn:active {
        background: #e94560;
        color: #0f3460;
      }
      #overlay .menu-btn.secondary {
        border-color: #88ccff;
        color: #88ccff;
      }
      #overlay .menu-btn.secondary:active {
        background: #88ccff;
        color: #0f3460;
      }
      #help-content {
        max-width: 380px;
        width: 100%;
        text-align: left;
        font-size: 13px;
        line-height: 1.7;
        color: #c8c8c8;
      }
      #help-content h2 {
        color: #e94560;
        font-size: 16px;
        margin: 16px 0 6px 0;
        border-bottom: 1px solid #2a3a5e;
        padding-bottom: 2px;
      }
      #help-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 4px 0 8px 0;
      }
      #help-content td {
        padding: 2px 6px;
        vertical-align: top;
      }
      #help-content td:first-child {
        white-space: nowrap;
        color: #88ccff;
        width: 70px;
      }
      .back-btn-wrap {
        margin-top: 20px;
        text-align: center;
      }

      /* D-pad */
      #controls-row {
        width: 100%;
        display: flex;
        gap: 4px;
        padding: 4px;
        background: linear-gradient(0deg, #0d1b30, #16213e);
        border-top: 1px solid #2a3a5e;
      }
      #dpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        flex-shrink: 0;
        width: 132px;
      }
      #dpad button {
        background: #0f3460;
        color: #88ccff;
        border: 1px solid #334466;
        font-size: 18px;
        width: 42px;
        height: 42px;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        font-family: "Courier New", monospace;
      }
      #dpad button:active {
        background: #88ccff;
        color: #0f3460;
      }
      #skill-bar {
        flex: 1;
        padding: 2px 4px;
        background: transparent;
        display: grid;
        grid-template-columns: repeat(1, 1fr);
        gap: 2px;
        border-top: none;
      }
      #skill-bar button {
        background: #0f3460;
        color: #e94560;
        border: 1px solid #e94560;
        padding: 4px 4px;
        font-family: "Courier New", monospace;
        font-size: 11px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.1s;
        min-height: 24px;
      }
      #skill-bar button:active:not(:disabled) {
        background: #e94560;
        color: #0f3460;
      }
      #skill-bar button:disabled {
        opacity: 0.3;
        border-color: #666;
        color: #666;
      }
      #skill-bar button.wait-btn {
        border-color: #88ccff;
        color: #88ccff;
      }
      #skill-bar button.descend-btn {
        border-color: #ffcc00;
        color: #ffcc00;
      }
    </style>
  </head>
  <body>
    <div id="overlay"><!-- filled by JS --></div>
    <div id="status-bar"></div>
    <div id="game-container"></div>
    <div id="message-log"></div>
    <div id="controls-row">
      <div id="dpad"></div>
      <div id="skill-bar"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
